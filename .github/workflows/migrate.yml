name: OpenStack Migration Pipeline

on:
  workflow_dispatch:
    inputs:
      vmname:
        description: 'Name of the VM'
        required: true
      vmdk_url:
        description: 'S3 URL to the source .vmdk'
        required: true
permissions:
  id-token: write   # Required for requesting the JWT (OIDC)
  contents: read    # Required for actions/checkout
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::319310747432:role/GitHubActionsServiceRole # The ARN from your bootstrap output
          aws-region: us-east-1

      - name: Install Migration Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils
          # Required for virt-customize to work in some containerized environments
          sudo chmod 0644 /boot/vmlinuz*

      - name: Download VMDK
        run: |
          mkdir -p vm-images
          aws s3 cp ${{ github.event.inputs.vmdk_url }} vm-images/source.vmdk

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="vm_name=${{ github.event.inputs.vmname }}" \
            -var="vmdk_path=vm-images/source.vmdk" \
            -var="qcow_path=vm-images/converted.qcow2"
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_PROJECT_NAME: ${{ secrets.OS_PROJECT_NAME }}
          OS_DOMAIN_NAME: ${{ secrets.OS_DOMAIN_NAME }}

  # To destroy, you would run a separate job or a manual trigger
  destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Terraform Destroy
        run: terraform destroy -auto-approve